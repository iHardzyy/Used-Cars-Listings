<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Meet the Team - Pre Owned Motors</title>
    <meta name="description" content="Meet the team behind Pre Owned Motors. Get to know our staff and reach out directly." />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Roboto', sans-serif;
            background: url('background.jpg') no-repeat center center fixed;
            background-size: cover;
            color: #e0e0e0;
            line-height: 1.6;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(0, 0, 0, 0.8) 0%, rgba(42, 74, 70, 0.2) 100%);
            z-index: -1;
        }

        .top-bar {
            background: linear-gradient(90deg, rgba(22, 22, 22, 0.95) 0%, rgba(33, 33, 36, 0.95) 100%);
            backdrop-filter: blur(10px);
            padding: 15px 0;
            border-bottom: 2px solid rgba(42, 74, 70, 0.5);
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .hamburger {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 1001;
            background: linear-gradient(45deg, #2a4a46, #3b635f);
            border: none;
            border-radius: 8px;
            padding: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(42, 74, 70, 0.3);
        }

        .hamburger:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(42, 74, 70, 0.4);
        }

        .hamburger span {
            display: block;
            width: 25px;
            height: 3px;
            background: white;
            margin: 5px 0;
            transition: all 0.3s ease;
            border-radius: 2px;
        }

        .hamburger.active span:nth-child(1) {
            transform: rotate(-45deg) translate(-5px, 6px);
        }

        .hamburger.active span:nth-child(2) {
            opacity: 0;
        }

        .hamburger.active span:nth-child(3) {
            transform: rotate(45deg) translate(-5px, -6px);
        }

        .side-nav {
            position: fixed;
            top: 0;
            left: -300px;
            width: 300px;
            height: 100vh;
            background: linear-gradient(180deg, rgba(22, 22, 22, 0.98) 0%, rgba(33, 33, 36, 0.98) 100%);
            backdrop-filter: blur(20px);
            transition: left 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            z-index: 1000;
            padding: 80px 0 30px 0;
            border-right: 3px solid rgba(42, 74, 70, 0.5);
            box-shadow: 5px 0 25px rgba(0, 0, 0, 0.3);
        }

        .side-nav.active {
            left: 0;
        }

        .side-nav .nav-header {
            padding: 0 30px 30px 30px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            margin-bottom: 20px;
        }

        .side-nav .nav-header h2 {
            color: #fff;
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(45deg, #fff, #ffc107, #2a4a46);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .side-nav ul {
            list-style: none;
            padding: 0;
        }

        .side-nav li {
            margin: 0;
        }

        .side-nav a {
            display: block;
            color: #e0e0e0;
            text-decoration: none;
            padding: 18px 30px;
            font-weight: 500;
            font-size: 1.1rem;
            transition: all 0.3s ease;
            position: relative;
            border-left: 4px solid transparent;
        }

        .side-nav a::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 0;
            height: 100%;
            background: linear-gradient(90deg, rgba(42, 74, 70, 0.3), rgba(42, 74, 70, 0.1));
            transition: width 0.3s ease;
            z-index: -1;
        }

        .side-nav a:hover {
            color: #fff;
            border-left-color: #2a4a46;
            transform: translateX(10px);
        }

        .side-nav a:hover::before {
            width: 100%;
        }

        .side-nav a[href*="team"] {
            color: #fff;
            border-left-color: #2a4a46;
            background: linear-gradient(90deg, rgba(42, 74, 70, 0.4), rgba(42, 74, 70, 0.2));
        }

        .side-nav a[href*="policy"] {
            color: #6c757d;
        }

        .side-nav a[href*="apply"] {
            color: #4fd1c5;
        }

        .side-nav a[href*="admin"] {
            color: #2a4a46;
        }

        .side-nav a[href*="applications"] {
            color: #2a4a46;
        }

        .side-nav a::after {
            content: '';
            position: absolute;
            right: 25px;
            top: 50%;
            transform: translateY(-50%);
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: currentColor;
            opacity: 0.6;
            transition: all 0.3s ease;
        }

        .side-nav a:hover::after {
            opacity: 1;
            transform: translateY(-50%) scale(1.5);
        }

        .nav-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(5px);
            opacity: 0;
            visibility: hidden;
            transition: all 0.4s ease;
            z-index: 999;
        }

        .nav-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .container {
            width: 95%;
            max-width: 1300px;
            margin: auto;
            padding: 25px 20px;
        }

        header {
            background: linear-gradient(135deg, rgba(31, 31, 31, 0.95) 0%, rgba(33, 33, 36, 0.9) 100%);
            backdrop-filter: blur(15px);
            color: #fff;
            padding: 3rem 0;
            text-align: center;
            border-bottom: 4px solid #2a4a46;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            position: relative;
            overflow: hidden;
        }

        header::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(42, 74, 70, 0.2) 0%, transparent 70%);
            animation: rotate 20s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        header h1 {
            margin: 0;
            font-size: 3.5rem;
            font-weight: 900;
            background: linear-gradient(45deg, #fff, #ffc107, #2a4a46);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 4px 20px rgba(42, 74, 70, 0.3);
            position: relative;
            z-index: 1;
        }

        header p {
            margin: 10px 0 0 0;
            color: #ccc;
            font-size: 1.3rem;
            font-weight: 300;
            position: relative;
            z-index: 1;
        }

        /* ── Team Grid ── */
        #teamGrid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 35px;
        }

        .team-card {
            background: linear-gradient(145deg, rgba(33, 33, 36, 0.95), rgba(26, 26, 26, 0.95));
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
            overflow: hidden;
            transition: all 0.4s ease;
            position: relative;
            backdrop-filter: blur(10px);
            opacity: 0;
            transform: translateY(30px);
            animation: fadeInUp 0.6s ease forwards;
        }

        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .team-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, #2a4a46, #3b635f, #ffc107);
            transform: scaleX(0);
            transition: transform 0.4s ease;
        }

        .team-card:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 20px 60px rgba(42, 74, 70, 0.3);
            border-color: rgba(42, 74, 70, 0.4);
        }

        .team-card:hover::before {
            transform: scaleX(1);
        }

        .team-card-photo {
            width: 100%;
            height: 280px;
            object-fit: contain;
            background: linear-gradient(45deg, #161616, #2a2a2a);
            transition: transform 0.4s ease;
        }

        .team-card:hover .team-card-photo {
            transform: scale(1.05);
        }

        .team-card-photo-wrap {
            overflow: hidden;
            position: relative;
        }

        .team-card-photo-wrap::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 60px;
            background: linear-gradient(to bottom, transparent, rgba(26, 26, 26, 0.7));
            pointer-events: none;
        }

        .team-card-body {
            padding: 25px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .team-card-role {
            font-size: 0.78rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #ffc107;
            font-weight: 700;
            margin-bottom: 6px;
        }

        .team-card-name {
            font-size: 1.6rem;
            font-weight: 700;
            color: #fff;
            margin-bottom: 12px;
            line-height: 1.2;
        }

        .team-card-bio {
            color: #bbb;
            font-size: 0.95rem;
            line-height: 1.7;
            margin-bottom: 16px;
            flex-grow: 1;
        }

        .team-card-phone {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(42, 74, 70, 0.2);
            border: 1px solid rgba(42, 74, 70, 0.3);
            padding: 10px 16px;
            border-radius: 12px;
            color: #a8cfe0;
            font-family: 'Roboto', monospace;
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: auto;
            position: relative;
            user-select: none;
        }

        .team-card-phone:hover {
            background: rgba(42, 74, 70, 0.35);
            border-color: rgba(42, 74, 70, 0.5);
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(42, 74, 70, 0.2);
            color: #fff;
        }

        .team-card-phone-icon {
            font-size: 1.1rem;
        }

        .team-card-phone .copy-tooltip {
            position: absolute;
            top: -30px;
            left: 50%;
            transform: translateX(-50%);
            background: #2a4a46;
            color: #fff;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 0.75rem;
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .team-card-phone .copy-tooltip.show {
            opacity: 1;
        }

        /* No-photo placeholder */
        .team-card-no-photo {
            width: 100%;
            height: 280px;
            background: linear-gradient(135deg, #1a2a28, #2a4a46);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 5rem;
            color: rgba(255, 255, 255, 0.15);
        }

        /* Loading spinner */
        .loading-spinner {
            display: none;
            justify-content: center;
            align-items: center;
            padding: 50px;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(42, 74, 70, 0.3);
            border-top: 4px solid #2a4a46;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .no-team {
            grid-column: 1 / -1;
            text-align: center;
            padding: 60px 20px;
            background: rgba(33, 33, 36, 0.8);
            border-radius: 20px;
            border: 2px dashed rgba(255, 193, 7, 0.3);
        }

        .no-team h3 {
            color: #ffc107;
            font-size: 1.5rem;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .no-team p {
            color: #aaa;
            font-size: 1.1rem;
        }

        /* ── Responsive ── */
        @media (max-width: 768px) {
            #teamGrid {
                grid-template-columns: 1fr;
                gap: 25px;
            }

            .container {
                padding: 15px;
            }

            header h1 {
                font-size: 2.5rem;
            }

            header p {
                font-size: 1.1rem;
            }

            .side-nav {
                width: 280px;
                left: -280px;
            }
        }

        @media (max-width: 480px) {
            header h1 {
                font-size: 2rem;
            }

            .side-nav {
                width: 100vw;
                left: -100vw;
            }

            .hamburger {
                top: 15px;
                left: 15px;
                padding: 10px;
            }

            .hamburger span {
                width: 22px;
                height: 2px;
            }

            .team-card-no-photo,
            .team-card-photo {
                height: 220px;
            }
        }
    </style>
</head>

<body>
    <button class="hamburger" id="hamburger">
        <span></span>
        <span></span>
        <span></span>
    </button>

    <div class="nav-overlay" id="navOverlay"></div>

    <nav class="side-nav" id="navMenu">
        <div class="nav-header">
            <h2>Navigation</h2>
        </div>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="team.html">Meet the Team</a></li>
            <li><a href="policy.html">Purchase Policy</a></li>
            <li><a href="apply.html">Apply for a Job</a></li>
            <li><a href="admin.html">Admin Panel</a></li>
            <li><a href="applications.html">Applications</a></li>
        </ul>
    </nav>

    <div class="top-bar">
        <span style="color: #ffc107; font-weight: 600; font-size: 1.1rem;">Pre Owned Motors</span>
    </div>

    <header>
        <h1>Meet the Team</h1>
        <p>The people behind Pre Owned Motors</p>
    </header>

    <main class="container">
        <div class="loading-spinner" id="loadingSpinner">
            <div class="spinner"></div>
        </div>

        <div id="teamGrid"></div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const SUPABASE_URL = 'https://kgwrhkbauhjcrqtjofvf.supabase.co';
            const SUPABASE_KEY = 'sb_publishable_tMRBcEVBhIOtdL-o14dKtA_0WTLkQeI';
            const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

            const teamGrid = document.getElementById('teamGrid');
            const loadingSpinner = document.getElementById('loadingSpinner');

            const RANK_ORDER = { 'Owner': 0, 'CoOwner': 1, 'Management': 2, 'Head Of Sales': 3, 'Sales': 4 };

            async function loadTeam() {
                try {
                    loadingSpinner.style.display = 'flex';
                    teamGrid.innerHTML = '';

                    const { data: members, error } = await client
                        .from('team_members')
                        .select('*')
                        .order('created_at', { ascending: true });

                    if (error) throw error;

                    // Sort by rank hierarchy
                    if (members) members.sort((a, b) => (RANK_ORDER[a.role] ?? 99) - (RANK_ORDER[b.role] ?? 99));

                    if (!members || members.length === 0) {
                        teamGrid.innerHTML = `
                            <div class="no-team">
                                <h3>No Team Members Yet</h3>
                                <p>Check back soon — we're building our team!</p>
                            </div>
                        `;
                        return;
                    }

                    members.forEach((member, index) => {
                        const card = document.createElement('div');
                        card.className = 'team-card';
                        card.style.animationDelay = `${index * 0.1}s`;

                        let photoHtml = '';
                        if (member.image) {
                            photoHtml = `
                                <div class="team-card-photo-wrap">
                                    <img class="team-card-photo" 
                                         src="${member.image}" 
                                         alt="${member.name}"
                                         loading="lazy"
                                         onerror="this.parentElement.innerHTML='<div class=\\'team-card-no-photo\\'>👤</div>'">
                                </div>
                            `;
                        } else {
                            photoHtml = `<div class="team-card-no-photo">👤</div>`;
                        }

                        let phoneHtml = '';
                        if (member.phone) {
                            const safePhone = member.phone.replace(/'/g, "\\'");
                            phoneHtml = `
                                <div class="team-card-phone" onclick="copyPhone('${safePhone}', this)">
                                    <span class="team-card-phone-icon">📋</span>
                                    ${member.phone}
                                    <span class="copy-tooltip">Copied!</span>
                                </div>
                            `;
                        }

                        let bioHtml = '';
                        if (member.bio && member.bio.trim()) {
                            bioHtml = `<div class="team-card-bio">${member.bio}</div>`;
                        }

                        card.innerHTML = `
                            ${photoHtml}
                            <div class="team-card-body">
                                <div class="team-card-role">${member.role || 'Staff'}</div>
                                <div class="team-card-name">${member.name || 'Team Member'}</div>
                                ${bioHtml}
                                ${phoneHtml}
                            </div>
                        `;
                        teamGrid.appendChild(card);
                    });

                } catch (error) {
                    loadingSpinner.style.display = 'none';
                    console.error('Error loading team:', error);
                    teamGrid.innerHTML = `
                        <div class="no-team">
                            <h3>Error Loading Team</h3>
                            <p>We're having trouble loading team info. Please try refreshing the page.</p>
                        </div>
                    `;
                } finally {
                    loadingSpinner.style.display = 'none';
                }
            }

            // ── Nav Logic ──
            const hamburger = document.getElementById('hamburger');
            const navMenu = document.getElementById('navMenu');
            const navOverlay = document.getElementById('navOverlay');

            function toggleMenu() {
                hamburger.classList.toggle('active');
                navMenu.classList.toggle('active');
                navOverlay.classList.toggle('active');
                document.body.style.overflow = navMenu.classList.contains('active') ? 'hidden' : '';
            }

            function closeMenu() {
                hamburger.classList.remove('active');
                navMenu.classList.remove('active');
                navOverlay.classList.remove('active');
                document.body.style.overflow = '';
            }

            hamburger.addEventListener('click', toggleMenu);
            navOverlay.addEventListener('click', closeMenu);
            navMenu.querySelectorAll('a').forEach(link => link.addEventListener('click', closeMenu));

            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape' && navMenu.classList.contains('active')) closeMenu();
            });

            loadTeam();
        });

        function copyPhone(phone, el) {
            navigator.clipboard.writeText(phone).then(() => {
                const tooltip = el.querySelector('.copy-tooltip');
                if (tooltip) {
                    tooltip.classList.add('show');
                    setTimeout(() => tooltip.classList.remove('show'), 1500);
                }
            }).catch(() => {
                // Fallback for older browsers
                const ta = document.createElement('textarea');
                ta.value = phone;
                document.body.appendChild(ta);
                ta.select();
                document.execCommand('copy');
                document.body.removeChild(ta);
                const tooltip = el.querySelector('.copy-tooltip');
                if (tooltip) {
                    tooltip.classList.add('show');
                    setTimeout(() => tooltip.classList.remove('show'), 1500);
                }
            });
        }
    </script>
</body>

</html>
